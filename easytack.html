<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>엑셀 자동 변환 사이트</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
.container { background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
#dropZone {
  border: 2px dashed #aaa;
  padding: 40px;
  text-align: center;
  margin-bottom: 20px;
  cursor: pointer;
}
#sheetButtons { margin-bottom: 15px; }
.sheet-btn {
  padding:8px 12px; margin-right:5px; border:none; border-radius:6px;
  background:#ddd; cursor:pointer;
}
.sheet-btn.active { background:#333; color:white; }

table { border-collapse: collapse; width: 100%; }
td, th { border: 1px solid #ddd; padding: 8px; }
th { background: #333; color: white; }
</style>
</head>
<body>

<div class="container">
  <h2>엑셀 → HTML 자동 변환</h2>
  <div id="dropZone">엑셀 파일을 여기에 드래그하거나 클릭하세요</div>
  <input type="file" id="fileInput" style="display:none" />

  <div id="sheetButtons"></div>
  <div id="output"></div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

let workbookGlobal = null;

// 클릭 업로드
 dropZone.onclick = () => fileInput.click();
 fileInput.onchange = (e) => handleFile(e.target.files[0]);

// 드래그 업로드
 dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.style.background = '#eef';
 });

 dropZone.addEventListener('dragleave', () => {
  dropZone.style.background = '';
 });

 dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.style.background = '';
  const file = e.dataTransfer.files[0];
  handleFile(file);
 });

function handleFile(file) {
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    workbookGlobal = workbook;
    createSheetButtons(workbook.SheetNames);

    // 첫 번째 시트 자동 표시
    showSheet(workbook.SheetNames[0]);
  };

  reader.readAsArrayBuffer(file);
}

function createSheetButtons(sheetNames) {
  const container = document.getElementById('sheetButtons');
  container.innerHTML = '';

  sheetNames.forEach((name, index) => {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.className = 'sheet-btn';

    btn.onclick = () => {
      document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showSheet(name);
    };

    if(index === 0) btn.classList.add('active');

    container.appendChild(btn);
  });
}

function showSheet(sheetName) {
  const sheet = workbookGlobal.Sheets[sheetName];
  const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  let html = '<table>';

  json.forEach((row, i) => {
    html += '<tr>';
    row.forEach(cell => {
      if(i === 0) {
        html += `<th>${cell || ''}</th>`;
      } else {
        html += `<td>${cell || ''}</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</table>';

  document.getElementById('output').innerHTML = html;
}
</script>

</body>
</html>
