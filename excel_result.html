function setActive(el){
document.querySelectorAll('.sheet-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

function createButtons(){
const container=document.getElementById('sheetButtons');
Object.keys(dataCache).forEach((name,i)=>{
const btn=document.createElement('button');
btn.textContent=name;
btn.className='sheet-btn';
btn.onclick=()=>{setActive(btn);showSheet(name);};
if(i===0) btn.classList.add('active');
container.appendChild(btn);
});
}

function showSheet(name){
const json=dataCache[name];
let html='<table>';
json.forEach((row,i)=>{
html+='<tr>';
row.forEach(cell=>{
if(i===0) html+='<th>'+ (cell||'') +'</th>';
else html+='<td>'+ (cell||'') +'</td>';
});
html+='</tr>';
});
html+='</table>';
document.getElementById('output').innerHTML=html;
}

createButtons();
showSheet(Object.keys(dataCache)[0]);
</script>
